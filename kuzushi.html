<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<title>将棋崩し - 真・四人将棋</title>
<link rel="icon" href="favicon.ico?v=1">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
:root{
  --bg:#d9932a; --wood:#f4d9a6; --wood2:#e2b36d;
  --frame:#c6862c; --dark:#7a4a00;
}
*{ box-sizing:border-box; margin:0; padding:0; }
body{
  background:var(--bg);
  font-family:'Hiragino Mincho ProN','Yu Mincho','MS Mincho',serif;
  display:flex; flex-direction:column; align-items:center;
  min-height:100vh; padding:10px 8px;
  user-select:none; -webkit-user-select:none;
}
h1{ color:#fff; font-size:22px; margin-bottom:6px;
    text-shadow:2px 2px 6px rgba(0,0,0,0.45); letter-spacing:2px; }
#hud{ display:flex; gap:8px; align-items:center;
      flex-wrap:wrap; justify-content:center; margin-bottom:6px; }
.stat{ background:var(--wood); border:2px solid var(--frame);
       border-radius:8px; padding:3px 14px;
       font-size:11px; font-weight:bold; color:var(--dark);
       text-align:center; min-width:80px; }
.stat-val{ font-size:24px; display:block; line-height:1.15; }
#msg{ color:#fff; font-size:13px; min-height:20px;
      text-shadow:1px 1px 3px rgba(0,0,0,0.5);
      margin-bottom:5px; text-align:center; }
canvas{ border:4px solid var(--frame); border-radius:10px;
        box-shadow:0 6px 32px rgba(0,0,0,0.5);
        display:block; cursor:grab; touch-action:none; max-width:100%; }
canvas:active{ cursor:grabbing; }
#btns{ margin-top:8px; display:flex; gap:8px; flex-wrap:wrap; justify-content:center; }
button{ padding:7px 18px; border-radius:8px;
        border:2px solid var(--frame); background:var(--wood);
        font-size:14px; cursor:pointer; font-family:inherit;
        font-weight:bold; color:var(--dark); transition:background .15s; }
button:hover{ background:var(--wood2); }
#note{ margin-top:8px; background:rgba(255,255,255,0.14);
       border-radius:8px; padding:7px 14px; font-size:12px;
       color:#fff; text-align:center; max-width:580px; line-height:1.9; }
</style>
</head>
<body>

<h1>🎴 将棋崩し</h1>
<div id="hud">
  <div class="stat">取った駒<span class="stat-val" id="score">0</span></div>
  <div class="stat">残り<span class="stat-val" id="remain">—</span></div>
  <div class="stat">崩し回数<span class="stat-val" id="miss">0</span></div>
</div>
<div id="msg">「山を作る」ボタンで始めよう！</div>
<canvas id="c"></canvas>
<div id="btns">
  <button onclick="startGame()">🎲 山を作る</button>
  <button onclick="location.href='./'">← 本将棋へ</button>
</div>
<div id="note">
  📌 駒をドラッグして、点線より上でリリース → 取れた！<br>
  他の駒を動かしてしまうと「崩し」がカウントされます。
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<script>
'use strict';
const {Engine,Bodies,Body,World,Events,Runner} = Matter;

/* ── Canvas size ── */
const CW = 580, CH = 480;
const canvas = document.getElementById('c');
canvas.width = CW; canvas.height = CH;
const ctx = canvas.getContext('2d');

/* ── Responsive scale ── */
(function resize(){
  const s = Math.min(1,(window.innerWidth-20)/CW);
  canvas.style.width  = (CW*s)+'px';
  canvas.style.height = (CH*s)+'px';
})();
window.addEventListener('resize', ()=>{
  const s = Math.min(1,(window.innerWidth-20)/CW);
  canvas.style.width  = (CW*s)+'px';
  canvas.style.height = (CH*s)+'px';
});

/* ── Constants ── */
const PW = 38, PH = 42;         // piece width/height
const TABLE_Y   = CH - 48;      // table surface y
const CAPTURE_Y = TABLE_Y - 180;// must lift above this to capture
const SPAWN_CX  = CW / 2;       // spawn x center
const SPAWN_TOP = TABLE_Y - 260;// highest spawn y
const SPAWN_W   = 200;          // spawn x spread

/* ── Piece set (40 pieces) ── */
const PIECE_DEFS = [
  {t:'王',n:2},{t:'飛',n:2},{t:'角',n:2},
  {t:'金',n:4},{t:'銀',n:4},{t:'桂',n:4},{t:'香',n:4},
  {t:'歩',n:18}
];
function makePileSet(){
  const a=[];
  PIECE_DEFS.forEach(({t,n})=>{ for(let i=0;i<n;i++) a.push(t); });
  return a.sort(()=>Math.random()-0.5);
}

/* ── Engine setup ── */
const engine = Engine.create({gravity:{x:0,y:2.0}});
const world  = engine.world;
const runner = Runner.create();
Runner.run(runner, engine);

let wallL, wallR, ground;
function buildStaticBodies(){
  if(ground){
    World.remove(world,ground);
    World.remove(world,wallL);
    World.remove(world,wallR);
  }
  ground = Bodies.rectangle(CW/2, CH+8,  CW+100, 20, {isStatic:true,friction:0.88,restitution:0.04});
  wallL  = Bodies.rectangle(-12,  CH/2,  24,     CH+200, {isStatic:true});
  wallR  = Bodies.rectangle(CW+12,CH/2,  24,     CH+200, {isStatic:true});
  World.add(world,[ground,wallL,wallR]);
}
buildStaticBodies();

/* ── State ── */
let pieces     = [];   // {body, type}
let score      = 0;
let mistakes   = 0;
let gamePhase  = 'idle'; // idle|settling|playing|gameover
let grabbed    = null;
let grabOffX   = 0, grabOffY = 0;
let mX = 0, mY = 0;
let flashRed   = 0;
let floats     = [];
let prevPos    = {};   // snapshot before drag
let spawnedCount = 0;
let totalCount   = 0;

/* ── Audio ── */
let ac;
function beep(f,d,t='sine',v=0.09){
  try{
    if(!ac) ac=new(window.AudioContext||window.webkitAudioContext)();
    const o=ac.createOscillator(), g=ac.createGain();
    o.type=t; o.frequency.value=f;
    g.gain.setValueAtTime(v,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ac.currentTime+d);
    o.connect(g); g.connect(ac.destination); o.start(); o.stop(ac.currentTime+d);
  }catch(e){}
}

/* ── HUD ── */
function updateHUD(){
  document.getElementById('score').textContent  = score;
  document.getElementById('remain').textContent =
    (gamePhase!=='idle') ? pieces.length : '—';
  document.getElementById('miss').textContent   = mistakes;
  const msgs = {
    idle:     '「山を作る」ボタンで始めよう！',
    settling: '山を積んでいます… 駒が落ち着いたら開始',
    playing:  '駒をドラッグして上のゾーンへ持ち上げよう！',
    gameover: `🎉 終了！ ${score}枚取得・崩し${mistakes}回`,
  };
  document.getElementById('msg').textContent = msgs[gamePhase]||'';
}

/* ── Start game ── */
function startGame(){
  // Remove old pieces
  pieces.forEach(p=>World.remove(world,p.body));
  pieces=[]; floats=[]; score=0; mistakes=0;
  grabbed=null; flashRed=0; prevPos={}; spawnedCount=0;
  gamePhase='settling';
  updateHUD();
  beep(520,0.1,'sine',0.07);

  const pool = makePileSet();
  totalCount = pool.length;

  // Spawn pieces one by one with a short delay between each
  pool.forEach((type,i)=>{
    setTimeout(()=>{
      const body = Bodies.rectangle(
        SPAWN_CX + (Math.random()-0.5)*SPAWN_W,
        SPAWN_TOP - i*2,          // stack slightly above previous
        PW, PH, {
          friction:0.78, frictionStatic:0.92, frictionAir:0.022,
          restitution:0.07, density:0.0028, label:'piece'
        }
      );
      Body.setAngle(body,(Math.random()-0.5)*0.5);
      World.add(world,body);
      pieces.push({body,type});
      spawnedCount++;

      // Once all pieces spawned, wait for settling
      if(spawnedCount===totalCount){
        waitForSettle();
      }
      updateHUD();
    }, i*55);  // 55ms between each piece
  });
}

/* Wait until all pieces stop moving */
function waitForSettle(){
  let checks = 0;
  const id = setInterval(()=>{
    checks++;
    // Min 1.5s wait, then check if settled
    if(checks < 28) return;
    const settled = pieces.every(p=>{
      const v = p.body.velocity;
      return Math.abs(v.x)<0.28 && Math.abs(v.y)<0.28 &&
             Math.abs(p.body.angularVelocity)<0.035;
    });
    if(settled || checks > 90){
      clearInterval(id);
      gamePhase='playing';
      beep(440,0.15,'triangle',0.08);
      updateHUD();
    }
  }, 120);
}

/* ── Input ── */
function getXY(e){
  const r  = canvas.getBoundingClientRect();
  const sx = CW/(r.width||CW), sy = CH/(r.height||CH);
  const s  = e.touches ? e.touches[0] : e;
  return {x:(s.clientX-r.left)*sx, y:(s.clientY-r.top)*sy};
}

function hitTest(body,px,py){
  const dx=px-body.position.x, dy=py-body.position.y;
  const ca=Math.cos(-body.angle), sa=Math.sin(-body.angle);
  const lx=dx*ca-dy*sa, ly=dx*sa+dy*ca;
  return Math.abs(lx)<PW/2+5 && Math.abs(ly)<PH/2+5;
}

canvas.addEventListener('mousedown',  onDown);
canvas.addEventListener('mousemove',  onMove);
canvas.addEventListener('mouseup',    onUp);
canvas.addEventListener('mouseleave', onUp);
canvas.addEventListener('touchstart', e=>{e.preventDefault();onDown(e);},{passive:false});
canvas.addEventListener('touchmove',  e=>{e.preventDefault();onMove(e);},{passive:false});
canvas.addEventListener('touchend',   e=>{e.preventDefault();onUp();   },{passive:false});

function onDown(e){
  if(gamePhase!=='playing') return;
  const p=getXY(e); mX=p.x; mY=p.y;

  // Find topmost piece under cursor
  let best=null, bestY=9999;
  pieces.forEach(pc=>{
    if(hitTest(pc.body,p.x,p.y) && pc.body.position.y<bestY){
      bestY=pc.body.position.y; best=pc;
    }
  });
  if(!best) return;

  // Snapshot all OTHER pieces
  prevPos={};
  pieces.forEach(pc=>{
    if(pc!==best) prevPos[pc.body.id]={x:pc.body.position.x,y:pc.body.position.y};
  });

  grabbed=best;
  grabOffX=best.body.position.x-p.x;
  grabOffY=best.body.position.y-p.y;
  Body.setFrictionAir(best.body,0.12);
  beep(620,0.05,'sine',0.06);
}

function onMove(e){ const p=getXY(e); mX=p.x; mY=p.y; }

function onUp(){
  if(!grabbed||gamePhase!=='playing') return;
  const pc=grabbed; const b=pc.body;
  Body.setFrictionAir(b,0.022);

  if(b.position.y < CAPTURE_Y){
    // SUCCESS — capture this piece
    score++;
    World.remove(world,b);
    pieces=pieces.filter(p=>p!==grabbed);
    floats.push({x:b.position.x,y:b.position.y,txt:`${pc.type}　GET！`,col:'#ffe84a',life:90});
    beep(860,0.07,'sine',0.10); setTimeout(()=>beep(1300,0.09,'sine',0.07),65);
  } else {
    floats.push({x:b.position.x,y:b.position.y-34,txt:'もっと上へ！',col:'rgba(255,255,255,0.8)',life:55});
  }

  // Check how many pieces moved
  let moved=0;
  pieces.forEach(pc=>{
    const pre=prevPos[pc.body.id];
    if(!pre) return;
    if(Math.hypot(pc.body.position.x-pre.x, pc.body.position.y-pre.y)>12) moved++;
  });
  if(moved>0){
    mistakes++;
    flashRed=50;
    floats.push({x:CW/2,y:CH/2-50,txt:`⚠ 崩れた！(${moved}個)`,col:'#ff8888',life:100});
    beep(160,0.30,'sawtooth',0.12);
  }

  grabbed=null;
  if(pieces.length===0&&gamePhase==='playing'){
    gamePhase='gameover';
    beep(523,0.1); setTimeout(()=>beep(659,0.1),110); setTimeout(()=>beep(784,0.2),220);
  }
  updateHUD();
}

/* ── Physics loop ── */
Events.on(engine,'beforeUpdate',()=>{
  if(!grabbed||gamePhase!=='playing') return;
  const b=grabbed.body;
  const tx=mX+grabOffX, ty=mY+grabOffY;
  Body.setVelocity(b,{x:(tx-b.position.x)*0.20, y:(ty-b.position.y)*0.20});
  Body.setAngularVelocity(b,b.angularVelocity*0.78);
});

/* ── Draw ── */
function drawBG(){
  const g=ctx.createLinearGradient(0,0,0,CH);
  g.addColorStop(0,'#e89828'); g.addColorStop(1,'#a85e10');
  ctx.fillStyle=g; ctx.fillRect(0,0,CW,CH);
  // wood grain
  ctx.strokeStyle='rgba(0,0,0,0.03)'; ctx.lineWidth=1;
  for(let y=0;y<CH;y+=6){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(CW,y);ctx.stroke();}
}

function drawTable(){
  // legs
  ctx.fillStyle='#6b3a0c';
  ctx.fillRect(70, TABLE_Y+20, 20, 60);
  ctx.fillRect(CW-90,TABLE_Y+20, 20, 60);
  // surface shadow
  ctx.shadowColor='rgba(0,0,0,0.4)'; ctx.shadowBlur=22; ctx.shadowOffsetY=12;
  ctx.fillStyle='#c8850c'; ctx.fillRect(50,TABLE_Y+18,CW-100,22);
  ctx.shadowColor='transparent'; ctx.shadowBlur=0; ctx.shadowOffsetY=0;
  // surface gradient
  const sg=ctx.createLinearGradient(0,TABLE_Y,0,TABLE_Y+22);
  sg.addColorStop(0,'#fef7dc'); sg.addColorStop(0.4,'#e8c566'); sg.addColorStop(1,'#b07820');
  ctx.fillStyle=sg; ctx.fillRect(50,TABLE_Y,CW-100,22);
  // plank lines
  ctx.strokeStyle='rgba(0,0,0,0.06)'; ctx.lineWidth=1;
  for(let x=70;x<CW-60;x+=34){ctx.beginPath();ctx.moveTo(x,TABLE_Y);ctx.lineTo(x,TABLE_Y+22);ctx.stroke();}
  // shine / shadow edges
  ctx.strokeStyle='rgba(255,255,255,0.45)'; ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(50,TABLE_Y+1);ctx.lineTo(CW-50,TABLE_Y+1);ctx.stroke();
  ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(50,TABLE_Y+21);ctx.lineTo(CW-50,TABLE_Y+21);ctx.stroke();
}

function drawCaptureZone(){
  // soft golden haze
  const g=ctx.createLinearGradient(0,0,0,CAPTURE_Y);
  g.addColorStop(0,'rgba(255,220,60,0.12)');
  g.addColorStop(1,'rgba(255,220,60,0)');
  ctx.fillStyle=g; ctx.fillRect(0,0,CW,CAPTURE_Y);
  // dashed line
  ctx.save(); ctx.setLineDash([12,7]);
  ctx.strokeStyle='rgba(255,255,220,0.32)'; ctx.lineWidth=1.5;
  ctx.beginPath();ctx.moveTo(20,CAPTURE_Y);ctx.lineTo(CW-20,CAPTURE_Y);ctx.stroke();
  ctx.restore();
  ctx.fillStyle='rgba(255,255,220,0.30)';
  ctx.font='11px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
  ctx.fillText('↑ ここより上でリリースすると取れる', CW/2, CAPTURE_Y-5);
}

function drawPiece(pc, isGrab){
  const b=pc.body, bx=b.position.x, by=b.position.y;
  const pre=prevPos[b.id];
  const isMoved = !isGrab && pre && Math.hypot(bx-pre.x,by-pre.y)>10;
  ctx.save();
  ctx.translate(bx,by); ctx.rotate(b.angle);

  // shadow
  if(isGrab){ ctx.shadowColor='rgba(255,210,0,0.9)'; ctx.shadowBlur=28; }
  else if(isMoved){ ctx.shadowColor='rgba(255,60,0,0.55)'; ctx.shadowBlur=16; }
  else { ctx.shadowColor='rgba(0,0,0,0.32)'; ctx.shadowBlur=6; ctx.shadowOffsetX=2; ctx.shadowOffsetY=2; }

  // pentagon shape
  const w=PW, h=PH, tip=h*0.18;
  ctx.beginPath();
  ctx.moveTo(0,-h/2);
  ctx.lineTo(w/2,-h/2+tip);
  ctx.lineTo(w/2, h/2);
  ctx.lineTo(-w/2, h/2);
  ctx.lineTo(-w/2,-h/2+tip);
  ctx.closePath();

  // fill
  const fg=ctx.createLinearGradient(-w/2,-h/2, w/2,h/2);
  if(isGrab){ fg.addColorStop(0,'#fffce4');fg.addColorStop(0.5,'#ffe040');fg.addColorStop(1,'#f0aa10'); }
  else if(isMoved){ fg.addColorStop(0,'#fff4c0');fg.addColorStop(0.5,'#ffba20');fg.addColorStop(1,'#e08800'); }
  else { fg.addColorStop(0,'#fef8e4');fg.addColorStop(0.5,'#edd080');fg.addColorStop(1,'#c8a050'); }
  ctx.fillStyle=fg; ctx.fill();

  ctx.shadowColor='transparent';ctx.shadowBlur=0;ctx.shadowOffsetX=0;ctx.shadowOffsetY=0;

  ctx.strokeStyle=isGrab?'#e88000':(isMoved?'#e84000':'#7c4800');
  ctx.lineWidth=isGrab?2.5:1.6; ctx.stroke();

  // inner inset
  ctx.beginPath();
  ctx.moveTo(0,-h/2+4);ctx.lineTo(w/2-4,-h/2+tip+2);
  ctx.lineTo(w/2-4,h/2-4);ctx.lineTo(-w/2+4,h/2-4);ctx.lineTo(-w/2+4,-h/2+tip+2);
  ctx.closePath();
  ctx.strokeStyle='rgba(120,65,0,0.18)';ctx.lineWidth=0.9;ctx.stroke();

  // character
  const promoted='龍馬全圭杏と'.includes(pc.type);
  ctx.fillStyle=promoted?'#c00':'#1a0900';
  ctx.font=`bold ${Math.round(w*0.60)}px 'Hiragino Mincho ProN','Yu Mincho',serif`;
  ctx.textAlign='center'; ctx.textBaseline='middle';
  ctx.fillText(pc.type,0,2);
  ctx.restore();
}

function drawFloats(){
  floats=floats.filter(f=>f.life>0);
  floats.forEach(f=>{
    ctx.globalAlpha=Math.min(1,f.life/30);
    ctx.font='bold 16px sans-serif'; ctx.textAlign='center'; ctx.textBaseline='alphabetic';
    ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=5;
    ctx.fillStyle=f.col; ctx.fillText(f.txt,f.x,f.y);
    ctx.shadowColor='transparent';ctx.shadowBlur=0;
    f.y-=1.0; f.life--;
  });
  ctx.globalAlpha=1;
}

function drawOverlay(){
  if(gamePhase==='idle'){
    ctx.fillStyle='rgba(0,0,0,0.26)'; ctx.fillRect(0,0,CW,CH);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(255,255,255,0.92)'; ctx.font='bold 32px serif';
    ctx.fillText('🎴 将棋崩し',CW/2,CH/2-36);
    ctx.font='15px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.60)';
    ctx.fillText('「山を作る」ボタンでゲーム開始！',CW/2,CH/2+8);
  }
  if(gamePhase==='settling'){
    ctx.fillStyle='rgba(0,0,0,0.30)'; ctx.fillRect(0,0,CW,CH);
    const d='●'.repeat(1+(Date.now()/400|0)%3);
    ctx.textAlign='center'; ctx.textBaseline='middle';
    ctx.fillStyle='rgba(255,255,200,0.90)'; ctx.font='bold 20px sans-serif';
    ctx.fillText('山を積んでいます  '+d,CW/2,CH/2-12);
    ctx.font='13px sans-serif'; ctx.fillStyle='rgba(255,255,255,0.52)';
    ctx.fillText('駒が落ち着いたら自動的に開始します',CW/2,CH/2+20);
  }
  if(gamePhase==='gameover'){
    ctx.fillStyle='rgba(0,0,0,0.65)'; ctx.fillRect(0,0,CW,CH);
    const pw=340, ph=210, px=(CW-pw)/2, py=(CH-ph)/2-14;
    const gr=ctx.createLinearGradient(px,py,px,py+ph);
    gr.addColorStop(0,'#fffce0'); gr.addColorStop(1,'#f0d050');
    ctx.fillStyle=gr;
    ctx.beginPath();
    ctx.roundRect(px,py,pw,ph,16); ctx.fill();
    ctx.strokeStyle='#c6862c'; ctx.lineWidth=3; ctx.stroke();
    ctx.textAlign='center'; ctx.textBaseline='middle'; ctx.fillStyle='#7a4a00';
    ctx.font='bold 26px serif'; ctx.fillText('🎉 ゲーム終了！',CW/2,py+44);
    const stars=score>=32?3:score>=18?2:score>=8?1:0;
    ctx.font='26px serif'; ctx.fillText('⭐'.repeat(stars)+'☆'.repeat(3-stars),CW/2,py+86);
    ctx.font='19px serif';
    ctx.fillText(`取った駒: ${score} 枚 / ${totalCount} 枚`,CW/2,py+124);
    ctx.fillText(`崩し回数: ${mistakes} 回`,CW/2,py+154);
    ctx.font='12px sans-serif'; ctx.fillStyle='#9a7020';
    ctx.fillText('「山を作る」でもう一度！',CW/2,py+192);
  }
}

function frame(){
  ctx.clearRect(0,0,CW,CH);
  drawBG();
  drawCaptureZone();
  drawTable();
  // non-grabbed first
  pieces.forEach(p=>{ if(p!==grabbed) drawPiece(p,false); });
  if(grabbed) drawPiece(grabbed,true);
  drawFloats();
  if(flashRed>0){
    ctx.globalAlpha=(flashRed/50)*0.35;
    ctx.fillStyle='#ff1111'; ctx.fillRect(0,0,CW,CH);
    ctx.globalAlpha=1; flashRed--;
  }
  drawOverlay();
  requestAnimationFrame(frame);
}

updateHUD();
frame();
</script>
</body>
</html>
